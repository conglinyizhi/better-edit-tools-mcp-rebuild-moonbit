name: Build and Test

on:
  push:
    branches: [main, master, doing/**]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/main.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: |
          moon version --all
          moonc -v

      - name: Check formatting
        run: moon fmt --check

      - name: Typecheck (deny warnings, include future-default 79)
        run: moon check --warn-list +79 --deny-warn

      - name: Run tests
        run: moon test

      - name: Build project
        run: moon build

      - name: Generate interface info
        run: moon info

      - name: Check interface files are up to date
        run: git diff --exit-code
